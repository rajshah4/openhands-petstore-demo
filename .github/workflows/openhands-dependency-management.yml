name: OpenHands Dependency Management

on:
  workflow_dispatch:
    inputs:
      update_scope:
        description: Safe update scope to request from OpenHands
        required: false
        default: safe-minor-and-patch
      branch:
        description: Branch to analyze
        required: false
        default: master
  schedule:
    - cron: '0 14 * * 1'

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: openhands-dependencies-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  dependency-management:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dispatcher dependencies
        run: pip install httpx

      - name: Start OpenHands dependency management
        env:
          OPENHANDS_API_KEY: ${{ secrets.OPENHANDS_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKILL_NAME: dependency-management
          SELECTED_BRANCH: ${{ github.event.inputs.branch || github.event.repository.default_branch }}
          POST_ACK_COMMENT: 'false'
          CONVERSATION_TITLE: 'Dependency management run'
        run: python .github/openhands/dispatch.py
